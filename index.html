<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Signalworks — write tiny assembly programs for in-game chips, route signals, and golf your cycle count."
    />
    <title>Signalworks</title>
    <meta property="og:title" content="Signalworks" />
    <meta
      property="og:description"
      content="Write tiny assembly programs for in-game chips, route signals, and golf your cycle count."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230b2545'/%3E%3Cpath d='M14 32h10m0 0l6-10m-6 10l6 10m4-10h20m-8-8l8 8-8 8' stroke='%234fd1ff' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='32' r='3.5' fill='%23ffb454'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar-row">
          <div>
            <h1 class="wordmark" aria-label="Signalworks">
              <span data-ch>S</span><span data-ch>I</span><span data-ch>G</span
              ><span data-ch>N</span><span data-ch>A</span><span data-ch>L</span
              ><span data-ch>W</span><span data-ch>O</span><span data-ch>R</span
              ><span data-ch>K</span><span data-ch>S</span>
            </h1>
            <p class="tagline">route signals · golf cycles · ship the fix</p>
          </div>
          <button id="levels-btn" type="button" class="btn btn-secondary">Levels</button>
        </div>
      </header>

      <main class="layout">
        <section class="board-pane">
          <div class="level-strip">
            <h2 id="level-title" class="level-title"></h2>
            <p id="level-description" class="level-description"></p>
            <p id="share-target" class="share-target" hidden></p>
          </div>
          <div class="board-shell">
            <canvas id="board" aria-label="Signalworks circuit board"></canvas>
            <div id="win-overlay" class="win-overlay" hidden>
              <div class="win-card">
                <p class="win-heading">PASS</p>
                <dl class="win-stats">
                  <div><dt>Cycles</dt><dd id="win-cycles">0</dd></div>
                  <div><dt>Instructions</dt><dd id="win-instructions">0</dd></div>
                  <div><dt>Best</dt><dd id="win-best">0</dd></div>
                </dl>
                <div class="win-actions">
                  <button id="win-next" type="button" class="btn btn-primary">Replay</button>
                  <button id="win-share" type="button" class="btn btn-secondary">Copy Share Link</button>
                </div>
                <p id="win-share-status" class="win-share-status" role="status" aria-live="polite"></p>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-pane">
          <div class="panel editor-panel">
            <div class="panel-header">
              <span>Program</span>
              <button
                id="mute-toggle"
                type="button"
                class="btn btn-ghost btn-small"
                aria-pressed="false"
              >
                Sound: On
              </button>
            </div>
            <textarea
              id="editor"
              class="editor"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              aria-label="Assembly program editor"
            ></textarea>
            <ul id="errors" class="error-list" hidden></ul>
            <div class="controls">
              <button id="run-btn" type="button" class="btn btn-primary">Run</button>
              <button id="step-btn" type="button" class="btn btn-secondary">Step</button>
              <button id="reset-btn" type="button" class="btn btn-ghost">Reset</button>
            </div>
          </div>

          <div class="panel listing-panel">
            <div class="panel-header"><span>Trace</span></div>
            <ol id="listing" class="listing" aria-label="Program listing with current instruction"></ol>
          </div>

          <div class="panel registers-panel">
            <div class="panel-header">
              <span>Registers</span>
              <span id="status-badge" class="status-badge status-idle" role="status" aria-live="polite"
                >IDLE</span
              >
            </div>
            <dl class="registers">
              <div><dt>ACC</dt><dd id="reg-acc">0</dd></div>
              <div><dt>PC</dt><dd id="reg-pc">0</dd></div>
              <div><dt>CYCLE</dt><dd id="reg-cycle">0</dd></div>
              <div><dt>IN left</dt><dd id="reg-in">0</dd></div>
              <div><dt>OUT</dt><dd id="reg-out">—</dd></div>
              <div><dt>Expected</dt><dd id="reg-expected">—</dd></div>
            </dl>
            <p id="fail-reason" class="fail-reason" hidden></p>
          </div>
        </aside>
      </main>

      <div
        id="level-select"
        class="level-select-overlay"
        role="dialog"
        aria-modal="true"
        aria-labelledby="level-select-heading"
        hidden
      >
        <div class="level-select-card">
          <div class="level-select-header">
            <h2 id="level-select-heading" class="level-select-heading">Levels</h2>
            <button
              id="level-select-close"
              type="button"
              class="btn btn-ghost btn-small"
              aria-label="Close level select"
            >
              Close
            </button>
          </div>
          <ul id="level-list" class="level-list" aria-label="Level list"></ul>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
