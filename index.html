<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Signalworks — write tiny assembly programs for in-game chips, route signals, and golf your cycle count."
    />
    <title>Signalworks</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230b2545'/%3E%3Cpath d='M14 32h10m0 0l6-10m-6 10l6 10m4-10h20m-8-8l8 8-8 8' stroke='%234fd1ff' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='50' cy='32' r='3.5' fill='%23ffb454'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1 class="wordmark" aria-label="Signalworks">
          <span data-ch>S</span><span data-ch>I</span><span data-ch>G</span
          ><span data-ch>N</span><span data-ch>A</span><span data-ch>L</span
          ><span data-ch>W</span><span data-ch>O</span><span data-ch>R</span
          ><span data-ch>K</span><span data-ch>S</span>
        </h1>
        <p class="tagline">route signals · golf cycles · ship the fix</p>
      </header>
      <main class="board-shell">
        <canvas id="board" aria-label="Signalworks circuit board preview"></canvas>
      </main>
      <footer class="statusline">
        <span id="boot-status">booting the board&hellip;</span>
      </footer>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
